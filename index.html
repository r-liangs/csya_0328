<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSYA Aircraft Systems Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #FAF6ED;
    --surface:    #F4EFE3;
    --surface2:   #EDE6D6;
    --border:     #D6C9AF;
    --accent:     #8B7355;
    --accent-lt:  rgba(139,115,85,0.11);
    --correct:    #4A6741;
    --correct-lt: rgba(74,103,65,0.10);
    --wrong:      #9B3A2A;
    --wrong-lt:   rgba(155,58,42,0.09);
    --flag:       #B8741A;
    --flag-lt:    rgba(184,116,26,0.11);
    --text:       #2C2416;
    --text-mid:   #5C4F3A;
    --text-muted: #9A8A72;
    --radius:     10px;
    --shadow:     0 2px 14px rgba(44,36,22,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Lora', serif;
    min-height: 100vh;
    padding: 36px 16px 100px;
    background-image:
      radial-gradient(ellipse at 15% 8%,  rgba(139,115,85,0.055) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 92%, rgba(139,115,85,0.055) 0%, transparent 55%);
  }

  /* ── Header ── */
  header { text-align: center; margin-bottom: 38px; }
  .eyebrow {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 1px;
    margin-bottom: 10px;
    opacity: 0.85;
  }
  header h1 {
    font-family: 'Lora', serif;
    font-weight: 700;
    font-size: clamp(24px, 5vw, 34px);
    color: var(--text);
    letter-spacing: -0.3px;
  }
  header p {
    font-family: 'Lora', serif;
    font-style: italic;
    color: var(--text-muted);
    font-size: 14px;
    margin-top: 7px;
  }
  .header-rule {
    width: 52px; height: 2px;
    background: var(--accent);
    margin: 16px auto 0;
    border-radius: 99px;
    opacity: 0.45;
  }

  /* ── Mode bar ── */
  .mode-bar {
    max-width: 740px;
    margin: 0 auto 22px;
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px; gap: 4px;
    box-shadow: var(--shadow);
  }
  .mode-btn {
    flex: 1; padding: 9px 6px;
    border: none; border-radius: 9px;
    font-family: 'Lora', serif;
    font-size: 13px; font-weight: 400;
    cursor: pointer;
    background: transparent;
    color: var(--text-muted);
    transition: background 0.18s, color 0.18s, box-shadow 0.18s;
  }
  .mode-btn.active {
    background: var(--bg);
    color: var(--accent);
    font-weight: 600;
    box-shadow: 0 1px 5px rgba(44,36,22,0.11);
    border: 1px solid var(--border);
  }

  /* ── Filter row ── */
  .filter-row {
    max-width: 740px; margin: 0 auto 18px;
    display: flex; gap: 10px;
    align-items: center; flex-wrap: wrap;
  }
  .filter-lbl {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 12px; color: var(--text-muted);
  }
  select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text); border-radius: 8px;
    padding: 6px 10px;
    font-family: 'Lora', serif;
    font-size: 13px; cursor: pointer;
  }
  .mode-badge {
    margin-left: auto;
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 12px; color: var(--text-muted);
  }

  /* ── Progress ── */
  .progress-wrap { max-width: 740px; margin: 0 auto 20px; }
  .progress-meta {
    display: flex; justify-content: space-between;
    font-family: 'Lora', serif;
    font-size: 12px; color: var(--text-muted);
    margin-bottom: 8px;
  }
  .progress-bar-outer {
    height: 4px; background: var(--surface2);
    border-radius: 99px; overflow: hidden;
    border: 1px solid var(--border);
  }
  .progress-bar-inner {
    height: 100%; background: var(--accent);
    border-radius: 99px;
    transition: width 0.45s cubic-bezier(.4,0,.2,1);
  }

  /* ── Stats ── */
  .stats-row {
    display: flex; gap: 10px;
    max-width: 740px; margin: 0 auto 22px;
  }
  .stat-box {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 13px 10px; text-align: center;
    box-shadow: var(--shadow);
    transition: transform 0.15s;
  }
  .stat-box:hover { transform: translateY(-1px); }
  .stat-box .val {
    font-family: 'Lora', serif;
    font-weight: 700;
    font-size: 28px; line-height: 1;
    transition: transform 0.2s;
  }
  .stat-box .lbl {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 11px; color: var(--text-muted);
    margin-top: 5px;
  }
  .stat-box.correct .val { color: var(--correct); }
  .stat-box.wrong   .val { color: var(--wrong); }
  .stat-box.flagged .val { color: var(--flag); }
  .stat-box.remain  .val { color: var(--accent); }

  /* number pop animation */
  @keyframes numPop {
    0%   { transform: scale(1); }
    45%  { transform: scale(1.28); }
    100% { transform: scale(1); }
  }
  .val.pop { animation: numPop 0.28s cubic-bezier(.3,1.4,.6,1) forwards; }

  /* ── Controls ── */
  .controls {
    max-width: 740px; margin: 0 auto 28px;
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .btn {
    font-family: 'Lora', serif;
    font-size: 13px; font-weight: 600;
    padding: 9px 20px; border-radius: 8px;
    border: none; cursor: pointer;
    transition: opacity 0.15s, transform 0.12s;
  }
  .btn:active { transform: scale(0.96); }
  .btn-primary { background: var(--accent); color: #FAF6ED; }
  .btn-ghost {
    background: var(--surface);
    color: var(--text-mid);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Card ── */
  .card {
    max-width: 740px; margin: 0 auto 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
    box-shadow: var(--shadow);
    transition: border-color 0.25s, box-shadow 0.25s;
    animation: cardIn 0.3s cubic-bezier(.2,.8,.4,1) both;
  }
  .card.flagged-card {
    border-color: var(--flag);
    box-shadow: 0 2px 14px rgba(184,116,26,0.1);
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* stagger cards */
  .card:nth-child(1)  { animation-delay: 0ms; }
  .card:nth-child(2)  { animation-delay: 18ms; }
  .card:nth-child(3)  { animation-delay: 36ms; }
  .card:nth-child(4)  { animation-delay: 54ms; }
  .card:nth-child(5)  { animation-delay: 72ms; }

  .card-header {
    display: flex; align-items: flex-start;
    gap: 12px; padding: 16px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .q-num {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 11px; font-weight: 500;
    color: var(--accent);
    background: var(--accent-lt);
    border: 1px solid rgba(139,115,85,0.22);
    border-radius: 6px; padding: 3px 9px;
    white-space: nowrap; margin-top: 2px; flex-shrink: 0;
  }
  .q-text {
    font-family: 'Lora', serif;
    font-weight: 700;
    font-size: 15px; line-height: 1.6; flex: 1;
  }
  .flag-btn {
    background: none; border: none; cursor: pointer;
    font-size: 17px; padding: 3px 5px;
    border-radius: 6px; flex-shrink: 0;
    opacity: 0.28; margin-top: 1px; line-height: 1;
    transition: opacity 0.18s, background 0.18s, transform 0.12s;
  }
  .flag-btn:hover { background: var(--flag-lt); opacity: 0.85; }
  .flag-btn.flagged { opacity: 1; }
  .flag-btn:active { transform: scale(0.80); }

  /* ── Options ── */
  .options {
    padding: 14px 18px;
    display: flex; flex-direction: column; gap: 8px;
  }

  .opt {
    display: flex; align-items: flex-start;
    gap: 13px; padding: 12px 15px;
    border: 1px solid var(--border);
    border-radius: 9px; cursor: pointer;
    background: var(--bg);
    text-align: left; color: var(--text);
    font-family: 'Lora', serif;
    font-weight: 400;
    font-size: 14px; line-height: 1.55;
    width: 100%;
    /* base transition for hover */
    transition:
      background 0.18s ease,
      border-color 0.18s ease,
      transform 0.15s cubic-bezier(.2,.8,.4,1),
      box-shadow 0.18s ease;
  }
  .opt:hover:not(:disabled) {
    background: var(--accent-lt);
    border-color: var(--accent);
    transform: translateX(3px);
  }

  /* letter badge */
  .opt-letter {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 12px; font-weight: 600;
    color: var(--text-muted);
    background: var(--surface2);
    border-radius: 5px;
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
    transition: background 0.2s, color 0.2s, transform 0.2s;
  }

  /* ── Answer reveal animations ── */

  /* correct chosen */
  .opt.correct-ans {
    background: var(--correct-lt);
    border-color: var(--correct);
    transform: translateX(0) !important;
    animation: correctPulse 0.4s cubic-bezier(.2,.8,.4,1) forwards;
  }
  @keyframes correctPulse {
    0%   { box-shadow: 0 0 0 0 rgba(74,103,65,0); transform: translateX(3px); }
    40%  { box-shadow: 0 0 0 5px rgba(74,103,65,0.15); }
    100% { box-shadow: 0 0 0 0 rgba(74,103,65,0); transform: translateX(0); }
  }
  .opt.correct-ans .opt-letter {
    background: var(--correct); color: #FAF6ED;
    animation: badgePop 0.3s 0.05s cubic-bezier(.3,1.5,.6,1) both;
  }

  /* wrong chosen */
  .opt.wrong-ans {
    background: var(--wrong-lt);
    border-color: var(--wrong);
    animation: wrongShake 0.38s cubic-bezier(.36,.07,.19,.97) both;
  }
  @keyframes wrongShake {
    0%,100% { transform: translateX(0); }
    18%     { transform: translateX(-5px); }
    36%     { transform: translateX(4px); }
    54%     { transform: translateX(-3px); }
    72%     { transform: translateX(2px); }
  }
  .opt.wrong-ans .opt-letter {
    background: var(--wrong); color: #FAF6ED;
    animation: badgePop 0.3s 0.05s cubic-bezier(.3,1.5,.6,1) both;
  }

  /* revealed correct (when user got it wrong) */
  .opt.revealed-correct {
    background: rgba(74,103,65,0.06);
    border-color: rgba(74,103,65,0.42);
    animation: revealSlide 0.32s 0.15s cubic-bezier(.2,.8,.4,1) both;
  }
  @keyframes revealSlide {
    from { opacity: 0.4; transform: translateX(-4px); }
    to   { opacity: 1;   transform: translateX(0); }
  }
  .opt.revealed-correct .opt-letter {
    background: rgba(74,103,65,0.22);
    color: var(--correct);
  }

  @keyframes badgePop {
    0%   { transform: scale(0.7); }
    60%  { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  .opt:disabled { cursor: default; }

  /* ── Feedback strip ── */
  .feedback {
    margin: 0 18px 14px;
    padding: 10px 15px; border-radius: 8px;
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 13px; font-weight: 500;
    display: flex; align-items: center; gap: 8px;
    /* hidden by default, slides in */
    opacity: 0;
    transform: translateY(-4px);
    transition: opacity 0.22s ease, transform 0.22s ease;
  }
  .feedback.show {
    opacity: 1;
    transform: translateY(0);
  }
  .feedback.ok {
    background: var(--correct-lt); color: var(--correct);
    border: 1px solid rgba(74,103,65,0.28);
  }
  .feedback.bad {
    background: var(--wrong-lt); color: var(--wrong);
    border: 1px solid rgba(155,58,42,0.24);
  }

  /* ── Results ── */
  #results {
    display: none;
    max-width: 740px; margin: 0 auto;
    text-align: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 48px 32px;
    box-shadow: var(--shadow);
    animation: cardIn 0.35s cubic-bezier(.2,.8,.4,1) both;
  }
  #results h2 {
    font-family: 'Lora', serif;
    font-weight: 700; font-size: 26px; margin-bottom: 6px;
  }
  .score-big {
    font-family: 'Lora', serif;
    font-weight: 700; font-size: 76px; line-height: 1;
    margin: 20px 0;
    animation: numPop 0.5s 0.1s cubic-bezier(.3,1.4,.6,1) both;
  }
  .score-big.pass { color: var(--correct); }
  .score-big.fail { color: var(--wrong); }
  #results p {
    font-family: 'Lora', serif;
    font-style: italic;
    color: var(--text-muted); font-size: 14px;
  }

  /* ── Empty state ── */
  .empty-state {
    max-width: 740px; margin: 0 auto;
    text-align: center; padding: 60px 24px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 42px; margin-bottom: 14px; }
  .empty-state h3 {
    font-family: 'Lora', serif;
    font-weight: 700; font-size: 19px;
    color: var(--text-mid); margin-bottom: 8px;
  }
  .empty-state p {
    font-family: 'Lora', serif;
    font-style: italic; font-size: 14px;
  }

  @media (max-width: 520px) {
    .stats-row { flex-wrap: wrap; }
    .stat-box { min-width: calc(50% - 5px); }
    .mode-btn { font-size: 11.5px; padding: 8px 4px; }
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">CPL Theory · Aircraft Systems</div>
  <h1>CSYA Question Bank</h1>
  <p>113 questions — select an answer to check immediately</p>
  <div class="header-rule"></div>
</header>

<div class="mode-bar">
  <button class="mode-btn active" onclick="setMode('all')">All</button>
  <button class="mode-btn" onclick="setMode('shuffle')">Shuffled</button>
  <button class="mode-btn" onclick="setMode('wrong')">Wrong Only</button>
  <button class="mode-btn" onclick="setMode('flagged')">🚩 Flagged</button>
</div>

<div class="filter-row">
  <span class="filter-lbl">Jump to</span>
  <select id="jumpSelect" onchange="jumpTo(this.value)">
    <option value="">— Q# —</option>
  </select>
  <span class="mode-badge" id="modeLabel">All Questions</span>
</div>

<div class="progress-wrap">
  <div class="progress-meta">
    <span id="progText">0 / 113 answered</span>
    <span id="progPct">0%</span>
  </div>
  <div class="progress-bar-outer">
    <div class="progress-bar-inner" id="progressBar" style="width:0%"></div>
  </div>
</div>

<div class="stats-row">
  <div class="stat-box correct"><div class="val" id="statCorrect">0</div><div class="lbl">Correct</div></div>
  <div class="stat-box wrong">  <div class="val" id="statWrong">0</div>  <div class="lbl">Wrong</div></div>
  <div class="stat-box flagged"><div class="val" id="statFlagged">0</div><div class="lbl">Flagged</div></div>
  <div class="stat-box remain"> <div class="val" id="statRemain">113</div><div class="lbl">Remaining</div></div>
</div>

<div class="controls">
  <button class="btn btn-primary" onclick="resetQuiz()">↺ Reset</button>
  <button class="btn btn-ghost"   onclick="showResults()">📊 Results</button>
</div>

<div id="quizArea"></div>

<div id="results">
  <div class="eyebrow" style="margin-bottom:10px">Final Score</div>
  <h2 id="resTitle"></h2>
  <div class="score-big" id="resPct"></div>
  <p id="resDetail"></p>
  <button class="btn btn-primary" onclick="resetQuiz()" style="margin-top:22px">Try Again</button>
</div>

<script>
const RAW = [
  {q:"What are Hydraulic thermal relief valves designed to accomplish?",opts:["control hydraulic pump fluid temperatures","redirect fluid flow from overheated brakes","keep the reservoir fluid temperature in limits","relieve excessive pressures due to thermal expansion"],ans:"d"},
  {q:"Pitting of the contact breaker points in a magneto is an indication of:",opts:["faulty ignition timing","earthing of the plug leads","faulty condenser","use of incorrect fuel grade"],ans:"c"},
  {q:"An aircraft that uses 100 octane fuel lands at an en-route airfield where only 80 octane fuel is available",opts:["the aircraft cannot refuel until 100 octane fuel is available","80 Octane can be used provided the duration of flight with low octane fuel is recorded in the maintenance release","refuel with the minimum amount of 80 Octane fuel necessary and continue the flight using lower power settings","the aircraft can refuel and proceed normally"],ans:"a"},
  {q:"If the oil filter on an aeroplane engine becomes blocked, the oil is then:",opts:["Fed to a metering jet.","Regulated by the pressure relief valve.","Forced through a bypass valve","Returned immediately to the oil tank"],ans:"c"},
  {q:"During a glide at idle power and constant IAS, if the RPM lever of a constant speed propeller is pushed fully forward from its normal cruise position, what will the effect be on the propeller pitch and rate of descent?",opts:["Pitch will Decrease and the rate of descent will decrease.","Pitch will Increase and the rate of descent will decrease","Pitch will Increase and the rate of descent will increase.","Pitch will Decrease and the rate of descent will increase."],ans:"d"},
  {q:"On most types of aircraft electrical safety systems designed to prevent inadvertent retraction of the undercarriage on the ground, are activated by which of the following?",opts:["A combination of throttle and flap position","The aeroplane's weight on at least one of the main wheels","The aeroplane's weight on the nose wheel","The aeroplane's taxi speed"],ans:"b"},
  {q:"The effect of ice formation in the carburettor is more severe at?",opts:["rich mixture settings","idle power settings","high altitudes","cruise power settings"],ans:"b"},
  {q:"In an aircraft fitted with a CSU to maintain a constant MP when climbing it is necessary to",opts:["gradually close the throttle","coarsen the propeller pitch to reduce engine speed and compensate by opening the throttle","gradually open the throttle","have the same prop and throttle settings all the way forward"],ans:"c"},
  {q:"When the centrifugal force acting on the propeller governor flyweights overcomes the tension on the speeder spring, a propeller is in what speed condition?",opts:["Under-speed.","Feather","Over-speed.","On-speed."],ans:"c"},
  {q:"A turbocharged engine's wastegate will be fully closed:",opts:["Well above the Critical Altitude","At the Critical Altitude.","Well below Critical Altitude.","Above the Critical Altitude."],ans:"b"},
  {q:"The fuel metering force of a conventional float-type carburetor in its normal operating range is the difference between the pressure acting on the discharge nozzle located within the venturi and the",opts:["pressure of the air as it enters the venturi (impact pressure).","Ram air pressure","atmospheric pressure acting on the fuel in the float chamber.","pressure of the fuel as it enters the carburetor."],ans:"c"},
  {q:"What is the advantage of Capacitive fire wire detectors over the Resistive variety?",opts:["they do not give a spurious fire warning when accidentally short-circuited.","they are longer","they are more sensitive to temperature change.","they do not require an external electrical supply"],ans:"a"},
  {q:"In an aeroplane equipped with a manifold pressure gauge, a tachometer, a cylinder head temperature gauge, and an exhaust-gas temperature indicator, the first indication of induction icing will be noted by a decrease in:",opts:["manifold pressure","rpm.","exhaust-gas temperature.","cylinder head temperature."],ans:"a"},
  {q:"A single acting propeller (standard type) on a single engine aircraft loses oil pressure during cruise flight. The effect on the propeller will be:",opts:["No movement of the blades","Movement of the blades to coarse pitch","Movement of the blades to reverse pitch","Movement of the blades to fine pitch"],ans:"d"},
  {q:"A single acting propeller (counter weight type) loses CSU oil pressure during cruise flight. What would the effect on the propeller be?",opts:["Movement of the blades to reverse pitch.","No movement of the blades.","Movement of the blades to coarse pitch.","Movement of the blades to fine pitch."],ans:"c"},
  {q:"When establishing a climb after take-off, the proper sequence of engine control adjustment with a constant-speed unit is:",opts:["manifold pressure followed by rpm.","rpm, mixture, and then manifold pressure.","manifold pressure and mixture but not the rpm.","mixture, followed by rpm and then manifold pressure."],ans:"a"},
  {q:"Which of the following best describes the blade movement of a full-feathering, constant-speed propeller that is in the LOW RPM position when the feathering action is begun?",opts:["Low pitch directly to feather position.","High pitch directly to feather position.","Low pitch through high pitch to feather position.","High pitch through low pitch to feather position."],ans:"b"},
  {q:"The undercarriage warning horn in a retractable undercarriage system may be activated by which of the following?",opts:["the air speed indicator","the position of the throttle lever","the position of the elevator trim","a squat switch located on the aircrafts nose wheel"],ans:"b"},
  {q:"The technique that an engine uses to tolerate and produce an Inlet Manifold Pressure beyond that which is available at Sea Level is known as:",opts:["Take Off Boosting","Ground Boosting","Altitude Boosting or Normalising","Reserve power"],ans:"b"},
  {q:"The property of gyroscopic precession is the basis of operation of the",opts:["artificial horizon","direction indicator","vertical speed indicator","turn and balance indicator"],ans:"d"},
  {q:"When compared with a normally aspirated engine, a turbocharged engine is:",opts:["less likely to suffer from detonation.","more likely to experience spark plug fouling","more likely to experience detonation.","more susceptible to pre-ignition."],ans:"c"},
  {q:"The duration of each stroke of a 4-stroke cycle engine is equivalent to",opts:["Half a revolution so long as there are only 4 cylinders","180 degrees of crankshaft rotation or half a revolution","720 degrees of crankshaft rotation","360 degrees of crankshaft rotation"],ans:"b"},
  {q:"The rate at which the engine converts heat energy to mechanical energy:",opts:["is the friction horsepower","is the indicated horsepower or torque","is the indicated horsepower","is the torque"],ans:"c"},
  {q:"The purpose of an intercooler when used with a turbocharger is to cool the:",opts:["exhaust gases before they come in contact with the turbo drive.","air entering the cylinders from the turbocharger.","turbocharger bearings.","Wastegate Assembly"],ans:"b"},
  {q:"The pilot would normally stop the engine by:",opts:["closing the throttle.","turning the fuel selector to OFF.","setting Idle Cut Off on the mixture control.","turning the ignition to OFF"],ans:"c"},
  {q:"If the manifold pressure is increased, what effect would it have on the blade angle of a constant speed propeller?",opts:["Blade Angle will remain the same","Blade Angle will increase and after a short time will reduce.","Blade Angle will increase.","Blade Angle will reduce so that the engine rpm can increase"],ans:"c"},
  {q:"What pressure does a Manifold Absolute Pressure gauge (MAP) display?",opts:["Pressure in the Induction Manifold upstream of the Inlet Valve; downstream of the Throttle","Ambient static pressure in Inches of Mercury.","The total pressure of air in the Induction Manifold upstream of the Throttle Valve","Carburettor inlet air pressure"],ans:"a"},

const LETTERS = ['a','b','c','d','e','f'];
let questions   = [];
let userAnswers = {};
let wrongSet    = new Set();
let flagSet     = new Set();
let mode        = 'all';

function buildQuestions() {
  if      (mode === 'shuffle') questions = [...RAW].sort(() => Math.random() - 0.5);
  else if (mode === 'wrong')   questions = RAW.filter((_,i) => wrongSet.has(i));
  else if (mode === 'flagged') questions = RAW.filter((_,i) => flagSet.has(i));
  else                         questions = [...RAW];
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach((b,i) => {
    b.classList.toggle('active', ['all','shuffle','wrong','flagged'][i] === m);
  });
  const labels = {all:'All Questions', shuffle:'Shuffled', wrong:'Wrong Only', flagged:'🚩 Flagged'};
  document.getElementById('modeLabel').textContent = labels[m];
  userAnswers = {};
  buildQuestions();
  renderAll();
  updateStats();
}

function resetQuiz() {
  wrongSet.clear(); flagSet.clear();
  userAnswers = {}; mode = 'all';
  document.querySelectorAll('.mode-btn').forEach((b,i) => b.classList.toggle('active', i===0));
  document.getElementById('modeLabel').textContent = 'All Questions';
  document.getElementById('results').style.display = 'none';
  buildQuestions(); renderAll(); updateStats();
}

function jumpTo(val) {
  if (!val) return;
  document.getElementById('q-'+val)?.scrollIntoView({behavior:'smooth', block:'start'});
  document.getElementById('jumpSelect').value = '';
}

function renderAll() {
  const area = document.getElementById('quizArea');
  const jump = document.getElementById('jumpSelect');
  area.innerHTML = '';
  jump.innerHTML = '<option value="">— Q# —</option>';

  if (questions.length === 0) {
    area.innerHTML = `<div class="empty-state">
      <div class="icon">${mode==='flagged'?'🚩':'✓'}</div>
      <h3>${mode==='flagged'?'No flagged questions yet':'Nothing here'}</h3>
      <p>${mode==='flagged'
        ? 'Tap the 🚩 icon on any question to flag it for review.'
        : 'You have not answered any questions incorrectly — well done.'}</p>
    </div>`;
    return;
  }

  questions.forEach((q, idx) => {
    const rawIdx    = RAW.indexOf(q);
    const isFlagged = flagSet.has(rawIdx);
    jump.innerHTML += `<option value="${idx}">Q${rawIdx+1}</option>`;

    const card = document.createElement('div');
    card.className = 'card' + (isFlagged ? ' flagged-card' : '');
    card.id = 'q-' + idx;
    card.style.animationDelay = Math.min(idx * 15, 120) + 'ms';

    const optsHTML = q.opts.map((opt, oi) => {
      const letter = LETTERS[oi];
      return `<button class="opt" id="opt-${idx}-${letter}" onclick="choose(${idx},'${letter}')">
        <span class="opt-letter">${letter}</span><span>${opt}</span>
      </button>`;
    }).join('');

    card.innerHTML = `
      <div class="card-header">
        <span class="q-num">Q${rawIdx+1}</span>
        <span class="q-text">${q.q}</span>
        <button class="flag-btn${isFlagged?' flagged':''}" id="flag-${idx}"
          onclick="toggleFlag(${idx})" title="${isFlagged?'Unflag':'Flag for review'}">🚩</button>
      </div>
      <div class="options">${optsHTML}</div>
      <div class="feedback" id="fb-${idx}"></div>
    `;
    area.appendChild(card);
    if (userAnswers[idx] !== undefined) applyAnswer(idx, userAnswers[idx], false);
  });
}

function toggleFlag(idx) {
  const rawIdx = RAW.indexOf(questions[idx]);
  const btn  = document.getElementById('flag-' + idx);
  const card = document.getElementById('q-' + idx);
  if (flagSet.has(rawIdx)) {
    flagSet.delete(rawIdx);
    btn.classList.remove('flagged');
    card.classList.remove('flagged-card');
    btn.title = 'Flag for review';
  } else {
    flagSet.add(rawIdx);
    btn.classList.add('flagged');
    card.classList.add('flagged-card');
    btn.title = 'Unflag';
  }
  updateStats();
}

function choose(idx, letter) {
  if (userAnswers[idx] !== undefined) return;
  userAnswers[idx] = letter;
  const rawIdx = RAW.indexOf(questions[idx]);
  if (questions[idx].ans !== letter) wrongSet.add(rawIdx);
  applyAnswer(idx, letter, true);
  updateStats();
}

function applyAnswer(idx, letter, animate) {
  const q = questions[idx];
  const correct = q.ans === letter;

  // disable all opts
  q.opts.forEach((_, oi) => {
    const b = document.getElementById(`opt-${idx}-${LETTERS[oi]}`);
    if (b) b.disabled = true;
  });

  // chosen button
  const chosenBtn = document.getElementById(`opt-${idx}-${letter}`);
  if (chosenBtn) chosenBtn.classList.add(correct ? 'correct-ans' : 'wrong-ans');

  // reveal correct if wrong
  if (!correct) {
    const corrBtn = document.getElementById(`opt-${idx}-${q.ans}`);
    if (corrBtn) corrBtn.classList.add('revealed-correct');
  }

  // feedback strip
  const fb = document.getElementById('fb-' + idx);
  if (fb) {
    fb.className = 'feedback ' + (correct ? 'ok' : 'bad');
    fb.innerHTML = correct
      ? '✓ Correct!'
      : `✗ Incorrect — correct answer: <strong>${q.ans.toUpperCase()}</strong>`;
    if (animate) {
      // tiny delay so CSS transition fires after class applied
      requestAnimationFrame(() => requestAnimationFrame(() => fb.classList.add('show')));
    } else {
      fb.classList.add('show');
    }
  }
}

function popVal(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.remove('pop');
  void el.offsetWidth; // reflow
  el.classList.add('pop');
}

function updateStats() {
  const total    = questions.length;
  const answered = Object.keys(userAnswers).length;
  const correct  = Object.values(userAnswers).filter((l,i) => l === questions[i]?.ans).length;
  const pct      = total ? Math.round(answered/total*100) : 0;

  const newCorrect = correct;
  const newWrong   = answered - correct;
  const newFlagged = flagSet.size;
  const newRemain  = total - answered;

  // pop changed values
  if (document.getElementById('statCorrect').textContent !== String(newCorrect)) popVal('statCorrect');
  if (document.getElementById('statWrong').textContent   !== String(newWrong))   popVal('statWrong');
  if (document.getElementById('statFlagged').textContent !== String(newFlagged)) popVal('statFlagged');
  if (document.getElementById('statRemain').textContent  !== String(newRemain))  popVal('statRemain');

  document.getElementById('statCorrect').textContent = newCorrect;
  document.getElementById('statWrong').textContent   = newWrong;
  document.getElementById('statFlagged').textContent = newFlagged;
  document.getElementById('statRemain').textContent  = newRemain;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progText').textContent    = `${answered} / ${total} answered`;
  document.getElementById('progPct').textContent     = pct + '%';
}

function showResults() {
  const total    = questions.length;
  const answered = Object.keys(userAnswers).length;
  if (!answered) { alert('Answer some questions first!'); return; }
  const correct = Object.values(userAnswers).filter((l,i) => l === questions[i]?.ans).length;
  const pct     = Math.round(correct/total*100);
  const el = document.getElementById('results');
  el.style.display = 'block';
  // re-trigger animation
  el.style.animation = 'none';
  void el.offsetWidth;
  el.style.animation = '';
  document.getElementById('resTitle').textContent  = pct >= 70 ? '🎉 Well Done!' : 'Keep Studying';
  document.getElementById('resPct').textContent    = pct + '%';
  document.getElementById('resPct').className      = 'score-big ' + (pct >= 70 ? 'pass' : 'fail');
  document.getElementById('resDetail').textContent =
    `${correct} correct out of ${answered} answered (${total} total questions)`;
  el.scrollIntoView({behavior:'smooth'});
}

resetQuiz();
</script>
</body>
</html>
