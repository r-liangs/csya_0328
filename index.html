<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CADA CASA PPE Prac</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#FAF6ED;--surface:#F4EFE3;--surface2:#EDE6D6;--border:#D6C9AF;
    --accent:#8B7355;--accent-lt:rgba(139,115,85,0.11);
    --correct:#4A6741;--correct-lt:rgba(74,103,65,0.10);
    --wrong:#9B3A2A;--wrong-lt:rgba(155,58,42,0.09);
    --flag:#B8741A;--flag-lt:rgba(184,116,26,0.11);
    --text:#2C2416;--text-mid:#5C4F3A;--text-muted:#9A8A72;
    --radius:10px;--shadow:0 2px 14px rgba(44,36,22,0.07);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Lora',serif;min-height:100vh;padding:36px 16px 100px;background-image:radial-gradient(ellipse at 15% 8%,rgba(139,115,85,0.055) 0%,transparent 55%),radial-gradient(ellipse at 85% 92%,rgba(139,115,85,0.055) 0%,transparent 55%);}
  header{text-align:center;margin-bottom:38px;}
  .eyebrow{font-style:italic;font-size:13px;color:var(--accent);letter-spacing:1px;margin-bottom:10px;opacity:0.85;}
  header h1{font-weight:700;font-size:clamp(22px,5vw,32px);color:var(--text);}
  header p{font-style:italic;color:var(--text-muted);font-size:14px;margin-top:7px;}
  .header-rule{width:52px;height:2px;background:var(--accent);margin:16px auto 0;border-radius:99px;opacity:0.45;}

  .answer-mode-bar{max-width:740px;margin:0 auto 22px;display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 18px;box-shadow:var(--shadow);}
  .am-label{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap;}
  .toggle-track{position:relative;width:52px;height:28px;background:var(--surface2);border:1px solid var(--border);border-radius:99px;cursor:pointer;flex-shrink:0;transition:background 0.25s,border-color 0.25s;}
  .toggle-track.on{background:var(--accent);border-color:var(--accent);}
  .toggle-thumb{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#FAF6ED;box-shadow:0 1px 4px rgba(44,36,22,0.18);transition:transform 0.25s cubic-bezier(.4,0,.2,1);}
  .toggle-track.on .toggle-thumb{transform:translateX(24px);}
  .am-desc{font-style:italic;font-size:13px;color:var(--text-mid);}
  .am-desc strong{font-style:normal;color:var(--accent);}

  .mode-bar{max-width:740px;margin:0 auto 22px;display:flex;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px;gap:4px;box-shadow:var(--shadow);}
  .mode-btn{flex:1;padding:9px 6px;border:none;border-radius:9px;font-family:'Lora',serif;font-size:13px;cursor:pointer;background:transparent;color:var(--text-muted);transition:background 0.18s,color 0.18s,box-shadow 0.18s;}
  .mode-btn.active{background:var(--bg);color:var(--accent);font-weight:600;box-shadow:0 1px 5px rgba(44,36,22,0.11);border:1px solid var(--border);}

  .filter-row{max-width:740px;margin:0 auto 18px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .filter-lbl{font-style:italic;font-size:12px;color:var(--text-muted);}
  select{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 10px;font-family:'Lora',serif;font-size:13px;cursor:pointer;}
  .mode-badge{margin-left:auto;font-style:italic;font-size:12px;color:var(--text-muted);}

  .progress-wrap{position:sticky;top:0;z-index:100;max-width:100%;margin:0 auto 20px;padding:12px 16px;background:rgba(250,246,237,0.88);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);border-radius:0 0 14px 14px;transition:box-shadow 0.25s;}
  .progress-wrap.scrolled{box-shadow:0 4px 16px rgba(44,36,22,0.12);}
  .progress-inner{max-width:740px;margin:0 auto;}
  .progress-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);margin-bottom:8px;}
  .progress-bar-outer{height:4px;background:var(--surface2);border-radius:99px;overflow:hidden;border:1px solid var(--border);}
  .progress-bar-inner{height:100%;background:var(--accent);border-radius:99px;transition:width 0.45s cubic-bezier(.4,0,.2,1);}

  .stats-row{display:flex;gap:10px;max-width:740px;margin:0 auto 22px;}
  .stat-box{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 10px;text-align:center;box-shadow:var(--shadow);transition:transform 0.15s;}
  .stat-box:hover{transform:translateY(-1px);}
  .stat-box .val{font-weight:700;font-size:28px;line-height:1;}
  .stat-box .lbl{font-style:italic;font-size:11px;color:var(--text-muted);margin-top:5px;}
  .stat-box.correct .val{color:var(--correct);}
  .stat-box.wrong .val{color:var(--wrong);}
  .stat-box.flagged .val{color:var(--flag);}
  .stat-box.remain .val{color:var(--accent);}
  @keyframes numPop{0%{transform:scale(1)}45%{transform:scale(1.28)}100%{transform:scale(1)}}
  .val.pop{animation:numPop 0.28s cubic-bezier(.3,1.4,.6,1) forwards;}

  .controls{max-width:740px;margin:0 auto 28px;display:flex;gap:10px;flex-wrap:wrap;}
  .btn{font-family:'Lora',serif;font-size:13px;font-weight:600;padding:9px 20px;border-radius:8px;border:none;cursor:pointer;transition:opacity 0.15s,transform 0.12s;}
  .btn:active{transform:scale(0.96);}
  .btn-primary{background:var(--accent);color:#FAF6ED;}
  .btn-ghost{background:var(--surface);color:var(--text-mid);border:1px solid var(--border);}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent);}

  .card{max-width:740px;margin:0 auto 18px;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);transition:border-color 0.25s,box-shadow 0.25s;animation:cardIn 0.3s cubic-bezier(.2,.8,.4,1) both;}
  .card.flagged-card{border-color:var(--flag);box-shadow:0 2px 14px rgba(184,116,26,0.1);}
  @keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

  .card-header{display:flex;align-items:flex-start;gap:12px;padding:16px 18px;border-bottom:1px solid var(--border);background:var(--surface2);}
  .q-num{font-style:italic;font-size:11px;font-weight:500;color:var(--accent);background:var(--accent-lt);border:1px solid rgba(139,115,85,0.22);border-radius:6px;padding:3px 9px;white-space:nowrap;margin-top:2px;flex-shrink:0;}
  .q-text{font-weight:700;font-size:15px;line-height:1.6;flex:1;}
  .flag-btn{background:none;border:none;cursor:pointer;font-size:17px;padding:3px 5px;border-radius:6px;flex-shrink:0;opacity:0.28;margin-top:1px;line-height:1;transition:opacity 0.18s,background 0.18s,transform 0.12s;}
  .flag-btn:hover{background:var(--flag-lt);opacity:0.85;}
  .flag-btn.flagged{opacity:1;}
  .flag-btn:active{transform:scale(0.80);}

  .options{padding:14px 18px;display:flex;flex-direction:column;gap:8px;}
  .opt{display:flex;align-items:flex-start;gap:13px;padding:12px 15px;border:1px solid var(--border);border-radius:9px;cursor:pointer;background:var(--bg);text-align:left;color:var(--text);font-family:'Lora',serif;font-weight:400;font-size:14px;line-height:1.55;width:100%;transition:background 0.18s ease,border-color 0.18s ease,transform 0.15s cubic-bezier(.2,.8,.4,1);}
  .opt:hover:not(:disabled):not(.lam-selected){background:var(--accent-lt);border-color:var(--accent);transform:translateX(3px);}
  .opt-letter{font-style:italic;font-size:12px;font-weight:600;color:var(--text-muted);background:var(--surface2);border-radius:5px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:background 0.2s,color 0.2s;}

  .opt.lam-selected{background:var(--accent-lt);border-color:var(--accent);transform:translateX(0) !important;}
  .opt.lam-selected .opt-letter{background:var(--accent);color:#FAF6ED;}

  .opt.correct-ans{background:var(--correct-lt);border-color:var(--correct);transform:translateX(0) !important;animation:correctPulse 0.4s cubic-bezier(.2,.8,.4,1) forwards;}
  @keyframes correctPulse{0%{box-shadow:0 0 0 0 rgba(74,103,65,0);transform:translateX(3px)}40%{box-shadow:0 0 0 5px rgba(74,103,65,0.15)}100%{box-shadow:0 0 0 0 rgba(74,103,65,0);transform:translateX(0)}}
  .opt.correct-ans .opt-letter{background:var(--correct);color:#FAF6ED;animation:badgePop 0.3s 0.05s cubic-bezier(.3,1.5,.6,1) both;}
  .opt.wrong-ans{background:var(--wrong-lt);border-color:var(--wrong);animation:wrongShake 0.38s cubic-bezier(.36,.07,.19,.97) both;}
  @keyframes wrongShake{0%,100%{transform:translateX(0)}18%{transform:translateX(-5px)}36%{transform:translateX(4px)}54%{transform:translateX(-3px)}72%{transform:translateX(2px)}}
  .opt.wrong-ans .opt-letter{background:var(--wrong);color:#FAF6ED;animation:badgePop 0.3s 0.05s cubic-bezier(.3,1.5,.6,1) both;}
  .opt.revealed-correct{background:rgba(74,103,65,0.06);border-color:rgba(74,103,65,0.42);animation:revealSlide 0.32s 0.15s cubic-bezier(.2,.8,.4,1) both;}
  @keyframes revealSlide{from{opacity:0.4;transform:translateX(-4px)}to{opacity:1;transform:translateX(0)}}
  .opt.revealed-correct .opt-letter{background:rgba(74,103,65,0.22);color:var(--correct);}
  @keyframes badgePop{0%{transform:scale(0.7)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
  .opt:disabled{cursor:default;}

  .feedback{margin:0 18px 14px;padding:10px 15px;border-radius:8px;font-style:italic;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;opacity:0;transform:translateY(-4px);transition:opacity 0.22s ease,transform 0.22s ease;}
  .feedback.show{opacity:1;transform:translateY(0);}
  .feedback.ok{background:var(--correct-lt);color:var(--correct);border:1px solid rgba(74,103,65,0.28);}
  .feedback.bad{background:var(--wrong-lt);color:var(--wrong);border:1px solid rgba(155,58,42,0.24);}

  .lam-check-wrap{max-width:740px;margin:8px auto 32px;display:none;flex-direction:column;align-items:center;gap:12px;}
  .lam-check-wrap.visible{display:flex;}
  .lam-progress-note{font-style:italic;font-size:13px;color:var(--text-muted);}
  .btn-check{font-family:'Lora',serif;font-size:15px;font-weight:700;padding:14px 40px;border-radius:10px;border:none;cursor:pointer;background:var(--correct);color:#FAF6ED;box-shadow:0 3px 14px rgba(74,103,65,0.25);transition:transform 0.12s,box-shadow 0.15s,opacity 0.15s;}
  .btn-check:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 5px 18px rgba(74,103,65,0.3);}
  .btn-check:active:not(:disabled){transform:scale(0.97);}
  .btn-check:disabled{opacity:0.4;cursor:not-allowed;}

  .lam-guide{max-width:740px;margin:0 auto 32px;display:none;flex-direction:column;gap:10px;}
  .lam-guide.visible{display:flex;}
  .lam-guide-title{font-style:italic;font-size:12px;color:var(--text-muted);text-align:center;letter-spacing:0.5px;}
  .lam-guide-grid{display:flex;flex-wrap:wrap;gap:7px;}
  .lam-guide-btn{
    font-family:'Lora',serif;font-style:italic;font-size:12px;font-weight:500;
    padding:6px 11px;border-radius:7px;border:1px solid var(--border);
    background:var(--surface);color:var(--text-muted);cursor:pointer;
    transition:transform 0.12s,box-shadow 0.12s;
    display:flex;align-items:center;gap:5px;white-space:nowrap;
  }
  .lam-guide-btn:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(44,36,22,0.1);}
  .lam-guide-btn:active{transform:scale(0.95);}
  .lam-guide-btn.gb-unanswered{border-color:var(--border);color:var(--text-muted);}
  .lam-guide-btn.gb-selected{border-color:var(--accent);background:var(--accent-lt);color:var(--accent);}
  .lam-guide-btn.gb-correct{border-color:var(--correct);background:var(--correct-lt);color:var(--correct);}
  .lam-guide-btn.gb-wrong{border-color:var(--wrong);background:var(--wrong-lt);color:var(--wrong);}
  .gb-flag{font-size:11px;line-height:1;}

  #results{display:none;max-width:740px;margin:0 auto;text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:48px 32px;box-shadow:var(--shadow);animation:cardIn 0.35s cubic-bezier(.2,.8,.4,1) both;}
  #results h2{font-weight:700;font-size:26px;margin-bottom:6px;}
  .score-big{font-weight:700;font-size:76px;line-height:1;margin:20px 0;animation:numPop 0.5s 0.1s cubic-bezier(.3,1.4,.6,1) both;}
  .score-big.pass{color:var(--correct);}
  .score-big.fail{color:var(--wrong);}
  #results p{font-style:italic;color:var(--text-muted);font-size:14px;}

  .empty-state{max-width:740px;margin:0 auto;text-align:center;padding:60px 24px;color:var(--text-muted);}
  .empty-state .icon{font-size:42px;margin-bottom:14px;}
  .empty-state h3{font-weight:700;font-size:19px;color:var(--text-mid);margin-bottom:8px;}
  .empty-state p{font-style:italic;font-size:14px;}

  @media(max-width:520px){.stats-row{flex-wrap:wrap}.stat-box{min-width:calc(50% - 5px)}.mode-btn{font-size:11.5px;padding:8px 4px}}

  /* Floating jump button — LAM only */
  .float-jump{position:fixed;right:22px;bottom:24px;width:52px;height:52px;border-radius:50%;border:1px solid var(--border);background:var(--accent);color:#FAF6ED;font-size:22px;cursor:pointer;box-shadow:0 4px 18px rgba(44,36,22,0.22);display:none;align-items:center;justify-content:center;z-index:200;transition:transform 0.18s,box-shadow 0.18s,background 0.25s;font-family:'Lora',serif;}
  .float-jump.visible{display:flex;}
  .float-jump:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(44,36,22,0.28);}
  .float-jump:active{transform:scale(0.92);}
</style>
</head>
<body>

<header>
  <div class="eyebrow">CPL Theory · Aerodynamics</div>
  <h1>CASA CADA PPE Prac</h1>
  <p>Road to 95+</p>
  <div class="header-rule"></div>
</header>

<div class="answer-mode-bar">
  <span class="am-label">Answer Mode</span>
  <div class="toggle-track on" id="lamToggle" onclick="toggleAnswerMode()">
    <div class="toggle-thumb"></div>
  </div>
  <span class="am-desc" id="amDesc"><strong>LAM</strong> — select all answers, then check at the end</span>
</div>

<div class="mode-bar">
  <button class="mode-btn active" onclick="setMode('all')">All</button>
  <button class="mode-btn" onclick="setMode('shuffle')">Shuffled</button>
  <button class="mode-btn" onclick="setMode('wrong')">Wrong Only</button>
  <button class="mode-btn" onclick="setMode('flagged')">🚩 Flagged</button>
</div>

<div class="filter-row">
  <span class="filter-lbl">Jump to</span>
  <select id="jumpSelect" onchange="jumpTo(this.value)"><option value="">— Q# —</option></select>
  <span class="mode-badge" id="modeLabel">All Questions</span>
</div>

<div class="progress-wrap" id="progressWrap">
  <div class="progress-inner">
    <div class="progress-meta">
      <span id="progText">0 / 3 selected</span>
      <span id="progPct">0%</span>
    </div>
    <div class="progress-bar-outer"><div class="progress-bar-inner" id="progressBar" style="width:0%"></div></div>
  </div>
</div>

<div class="stats-row">
  <div class="stat-box correct"><div class="val" id="statCorrect">0</div><div class="lbl">Correct</div></div>
  <div class="stat-box wrong">  <div class="val" id="statWrong">0</div>  <div class="lbl">Wrong</div></div>
  <div class="stat-box flagged"><div class="val" id="statFlagged">0</div><div class="lbl">Flagged</div></div>
  <div class="stat-box remain"> <div class="val" id="statRemain">3</div><div class="lbl">Remaining</div></div>
</div>

<div class="controls">
  <button class="btn btn-primary" onclick="resetQuiz()">↺ Reset</button>
  <button class="btn btn-ghost"   onclick="showResults()">📊 Results</button>
</div>

<div id="quizArea"></div>

<div class="lam-check-wrap visible" id="lamCheckWrap">
  <span class="lam-progress-note" id="lamNote">0 / 3 selected — answer all to unlock</span>
  <button class="btn-check" id="lamCheckBtn" onclick="lamRevealAll()" disabled>Check Answers</button>
</div>

<div class="lam-guide" id="lamGuide">
  <span class="lam-guide-title">Quick navigation — tap any question to jump</span>
  <div class="lam-guide-grid" id="lamGuideGrid"></div>
</div>

<div id="results">
  <div class="eyebrow" style="margin-bottom:10px">Final Score</div>
  <h2 id="resTitle"></h2>
  <div class="score-big" id="resPct"></div>
  <p id="resDetail"></p>
  <button class="btn btn-primary" onclick="resetQuiz()" style="margin-top:22px">Try Again</button>
</div>

<button class="float-jump" id="floatJump" onclick="floatJumpClick()" title="Jump to question list">↓</button>

<script>
const RAW = [
  {q:"A 747 has just aborted a landing on your active runway. You know you can rotate before the point it aborted (assuming a light aircraft). Do you delay your take off or go without delay?",opts:["No delay, because you will be well clear of the wake turbulence by your takeoff point","No delay, because the 747's wake turbulence only starts at the point where it aborted","Yes delay, because your flight path will be impacted by wake","Yes delay, because the wake turbulence circles upwards"],ans:"c"},
  {q:"You are climbing at the Vy. Subsequently, you decrease your airspeed slightly. Which of the following is the outcome?",opts:["Both rate of climb and angle of climb will increase","Both rate of climb and angle of climb will decrease","Rate of climb will decrease and angle of climb will increase","Rate of climb will increase and angle of climb will decrease"],ans:"c"},
  {q:"The aerodynamic centre is located at approximately ____ of the wing chord from front to back.",opts:["28%","25%","33%","50%"],ans:"b"},
  {q:"Which of the following is the correct times in order for rate turns 1, 2, 3, 4?",opts:["2 mins, 1.5 mins, 1 min, 30 sec","2 mins, 1 min, 40 sec, 30 sec","1 min, 2 min, 3 min, 4 min","4 min, 3 min, 2 min, 1 min"],ans:"a"},
  {q:"Beyond the stalling angle of a wing:",opts:["lift decreases and drag continues to increase","lift decreases and drag decreases at a higher rate","lift increases and drag increases","lift increases and drag continues to increase at a higher rate"],ans:"a"},
  {q:"You reduce speed from max cruising speed to max endurance speed; what is the effect on longitudinal stability?",opts:["Decreases","Increases","Remains constant"],ans:"a"},
  {q:"Design features to offset slip-streaming include:",opts:["offsetting the fin","biasing the rudder","all of these","offsetting the thrustline"],ans:"c"},
  {q:"The reason for prescribing a maximum structural cruising speed is to:",opts:["limit the stresses resulting from full or abrupt control surface movements","indicate the speed above which structural damage will occur in smooth conditions","indicate the speed above which unacceptable control surface flutter will occur","limit the stresses resulting from the aircraft's gust response characteristics"],ans:"d"},
  {q:"Once the aircraft goes past its stalling angle of attack, the centre of pressure:",opts:["no longer exists","moves rearward","moves forward","impossible to say"],ans:"b"},
  {q:"The benefits of a high chord ratio wing is:",opts:["increased MCRIT","smooth stall","sharper stall","decreased MCDR"],ans:"b"},
  {q:"Close to the ground vortices from large aircraft tend to sink to low levels then:",opts:["none of these","bounce off the ground rising up several hundred feet","dissipate as soon as they hit the ground","bounce off the ground rising to about 700 hundred feet"],ans:"a"},
  {q:"You are taking off from a parallel runway situation on runway 19L, wind is 10 KT 270° and a 747 has just landed on 19R. In relation to the vortices from the 747 you:",opts:["ought to be very cautious due to the wind direction","need not be too concerned as they are blowing away from your runway","need to be alarmed as they are blowing toward your runway","the wind has no effect on vortices"],ans:"a"},
  {q:"Ground effect is strongest:",opts:["during the landing phase of flight","immediately after lift-off","during the initial take-off roll","when flying at 50 ft AGL","when flying close to the stalling AOA"],ans:"b"},
  {q:"A pilot of a light aircraft with a TODR 2000ft takes off on the same runway as a superheavy aircraft with TODR 4750ft in 5kt quartering headwind conditions. The pilot of the light aircraft should?",opts:["Be aware of wake turbulence and stay above the flight path of the super heavy","Be extremely concerned about wake turbulence and abort the takeoff","Be aware of wake turbulence and drift stay below the flight path of the super heavy","Be aware of wake turbulence and drift and stay above the flight path of the super heavy"],ans:"d"},
  {q:"An aircraft in level flight, with a low angle of attack, will generally be at a higher power setting than the same aircraft when it has a high angle of attack.",opts:["False","True"],ans:"b"},
  {q:"Maximum endurance can be achieved by flying:",opts:["at the lowest possible RPM","none of these","at the lowest possible altitude","at the lowest possible speed"],ans:"a"},
  {q:"If an aircraft is descending and thrust is added, but no other control inputs are changed, what will be the result?",opts:["The increased thrust will make the aircraft hold its attitude and increase speed","The increased thrust will make the aircraft pitch up past level flight","None of these","The increased thrust will make the aircraft descend faster at a steeper angle","The increased thrust will reduce the angle of descent"],ans:"e"},
  {q:"Performance = ?",opts:["power + attitude","power + altitude","power x attitude","power / altitude"],ans:"a"},
  {q:"The most significant effect on an aeroplane's flight characteristics of NOT clearing frost from the wings prior to flight is that:",opts:["both the indicated stalling speed and stalling angle will be greater","the stalling angle will be higher than normal","there will be a marked deterioration in acceleration during the take-off run","the margin between the take-off safety speed and indicated stalling speed will be less"],ans:"d"},
  {q:"The benefits of vortex generators include:",opts:["lower lift off speed","lower stall speeds","all of these","improved controllability"],ans:"c"},
  {q:"If you double the speed in a turn for a given bank angle, you will _______________ the radius.",opts:["quadruple","not change","double","triple","halve"],ans:"a"},
  {q:"With an IAS of 100 kt and a headwind of 20 kt, the range of an aircraft will be closest to:",opts:["8/12ths of its original range","80% of its original range","Its range will not change, however its fuel consumption will","120% of its original range"],ans:"b"},
  {q:"The power required whilst turning is greater than that required for level flight at the same IAS and altitude because, in a turn:",opts:["power provides the necessary centripetal force","drag is higher though IAS is the same","the vertical component of lift is less","the stalling speed is higher"],ans:"b"},
  {q:"In a small (with MTOW < 5700 kg) light aircraft below 10,000 feet which will likely have the most impact on range on most occasions?",opts:["none of these","altitude flown","wind direction and speed","wind direction"],ans:"c"},
  {q:"Which of the following combination of factors would alter the indicated stalling speed of an aeroplane?",opts:["Power and gross weight","Altitude and load factor","All of these","Density altitude and wing loading","Turbulence and air density"],ans:"c"},

  {q:"A wind shear that causes a drop in IAS is known as a/an:",opts:["non-standard wind shear","undershoot wind shear","overshoot wind shear","standard wind shear"],ans:"b"},
  {q:"The force acting on an aircraft towards the inside of a turn is known as:",opts:["centrifical","lift","centripetal","centrifugial"],ans:"c"},
  {q:"An aircraft with a 10 to 1 lift drag ratio would be able to glide approximately ______ nm from 3000 feet AGL.",opts:["10 nm","5 nm","2 nm","8 nm"],ans:"b"},
  {q:"In high performance aircraft with passengers on board the best rate or angle of climb are:",opts:["used generally only when required","always used","never used","used around 50% of the time"],ans:"a"},
  {q:"Ground effect occurs due to:",opts:["an increase in the down wash from the wing","an increase in the down wash from the wing and a reduction in induced drag","a decrease in the down wash from the wing and a reduction in induced drag","a decrease in the down wash from the wing"],ans:"d"},
];

const LETTERS=['a','b','c','d','e','f','g'];
const SAVE_KEY='reference_template_v2';
let questions=[],userAnswers={};
let wrongSet=new Set(),flagSet=new Set();
let mode='all',isLAM=true,lamRevealed=false;

function saveState(){try{localStorage.setItem(SAVE_KEY,JSON.stringify({userAnswers,wrongSet:[...wrongSet],flagSet:[...flagSet],mode,isLAM,lamRevealed,ts:Date.now()}));}catch(e){}}
function loadState(){try{const r=localStorage.getItem(SAVE_KEY);if(!r)return false;const s=JSON.parse(r);userAnswers=s.userAnswers||{};wrongSet=new Set(s.wrongSet||[]);flagSet=new Set(s.flagSet||[]);mode=s.mode||'all';isLAM=s.isLAM!==undefined?s.isLAM:true;lamRevealed=!!s.lamRevealed;return true;}catch(e){return false;}}
function clearSave(){try{localStorage.removeItem(SAVE_KEY);}catch(e){}}

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function toggleAnswerMode(){
  isLAM=!isLAM;
  document.getElementById('lamToggle').classList.toggle('on',isLAM);
  document.getElementById('amDesc').innerHTML=isLAM
    ?'<strong>LAM</strong> — select all answers, then check at the end'
    :'<strong>IAM</strong> — answers revealed instantly after each pick';
  resetQuiz();
}

function buildQuestions(){
  if(mode==='shuffle') questions=[...RAW].sort(()=>Math.random()-0.5);
  else if(mode==='wrong') questions=RAW.filter((_,i)=>wrongSet.has(i));
  else if(mode==='flagged') questions=RAW.filter((_,i)=>flagSet.has(i));
  else questions=[...RAW];
}

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach((b,i)=>b.classList.toggle('active',['all','shuffle','wrong','flagged'][i]===m));
  document.getElementById('modeLabel').textContent={all:'All Questions',shuffle:'Shuffled',wrong:'Wrong Only',flagged:'🚩 Flagged'}[m];
  userAnswers={};lamRevealed=false;buildQuestions();renderAll();updateStats();saveState();
}

function resetQuiz(){
  wrongSet.clear();flagSet.clear();userAnswers={};lamRevealed=false;mode='all';
  document.querySelectorAll('.mode-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  document.getElementById('modeLabel').textContent='All Questions';
  document.getElementById('results').style.display='none';
  document.getElementById('lamToggle').classList.toggle('on',isLAM);
  document.getElementById('amDesc').innerHTML=isLAM
    ?'<strong>LAM</strong> — select all answers, then check at the end'
    :'<strong>IAM</strong> — answers revealed instantly after each pick';
  buildQuestions();renderAll();updateStats();clearSave();
}

function jumpTo(val){if(!val)return;document.getElementById('q-'+val)?.scrollIntoView({behavior:'smooth',block:'start'});document.getElementById('jumpSelect').value='';}

function renderAll(){
  const area=document.getElementById('quizArea');
  const jump=document.getElementById('jumpSelect');
  area.innerHTML='';jump.innerHTML='<option value="">— Q# —</option>';
  document.getElementById('lamCheckWrap').classList.toggle('visible',isLAM);

  if(questions.length===0){
    area.innerHTML=`<div class="empty-state"><div class="icon">${mode==='flagged'?'🚩':'✓'}</div><h3>${mode==='flagged'?'No flagged questions yet':'Nothing here'}</h3><p>${mode==='flagged'?'Tap the 🚩 icon on any question to flag it for review.':'You have not answered any questions incorrectly — well done.'}</p></div>`;
    updateLAMButton();renderGuide();if(typeof updateFloatJump==='function')updateFloatJump();return;
  }

  questions.forEach((q,idx)=>{
    const rawIdx=RAW.indexOf(q),isFlagged=flagSet.has(rawIdx);
    jump.innerHTML+=`<option value="${idx}">Q${rawIdx+1}</option>`;
    const card=document.createElement('div');
    card.className='card'+(isFlagged?' flagged-card':'');
    card.id='q-'+idx;
    card.style.animationDelay='0ms';
    const optsHTML=q.opts.map((opt,oi)=>{
      const l=LETTERS[oi];
      return`<button class="opt" id="opt-${idx}-${l}" onclick="choose(${idx},'${l}')"><span class="opt-letter">${l}</span><span>${opt}</span></button>`;
    }).join('');
    card.innerHTML=`<div class="card-header"><span class="q-num">Q${rawIdx+1}</span><span class="q-text">${q.q}</span><button class="flag-btn${isFlagged?' flagged':''}" id="flag-${idx}" onclick="toggleFlag(${idx})" title="${isFlagged?'Unflag':'Flag for review'}">🚩</button></div><div class="options">${optsHTML}</div><div class="feedback" id="fb-${idx}"></div>`;
    area.appendChild(card);
    if(userAnswers[idx]!==undefined){
      if(isLAM&&!lamRevealed) applyLAMSelect(idx,userAnswers[idx]);
      else applyAnswer(idx,userAnswers[idx],false);
    }
  });
  updateLAMButton();renderGuide();
  if(typeof updateFloatJump==='function')updateFloatJump();
}

function toggleFlag(idx){
  const rawIdx=RAW.indexOf(questions[idx]);
  const btn=document.getElementById('flag-'+idx),card=document.getElementById('q-'+idx);
  if(flagSet.has(rawIdx)){flagSet.delete(rawIdx);btn.classList.remove('flagged');card.classList.remove('flagged-card');btn.title='Flag for review';}
  else{flagSet.add(rawIdx);btn.classList.add('flagged');card.classList.add('flagged-card');btn.title='Unflag';}
  updateStats();updateGuide();saveState();
}

function choose(idx,letter){
  if(isLAM){
    if(lamRevealed)return;
    userAnswers[idx]=letter;
    applyLAMSelect(idx,letter);
    updateStats();updateLAMButton();updateGuide();saveState();
  }else{
    if(userAnswers[idx]!==undefined)return;
    userAnswers[idx]=letter;
    const rawIdx=RAW.indexOf(questions[idx]);
    if(letter!==questions[idx].ans) wrongSet.add(rawIdx);
    applyAnswer(idx,letter,true);updateStats();saveState();
  }
}

function applyLAMSelect(idx,letter){
  const q=questions[idx];
  q.opts.forEach((_,oi)=>{const b=document.getElementById(`opt-${idx}-${LETTERS[oi]}`);if(b)b.classList.remove('lam-selected');});
  const btn=document.getElementById(`opt-${idx}-${letter}`);
  if(btn)btn.classList.add('lam-selected');
}

function lamRevealAll(){
  lamRevealed=true;wrongSet.clear();
  questions.forEach((q,idx)=>{
    const rawIdx=RAW.indexOf(q),letter=userAnswers[idx];
    if(letter===undefined)return;
    q.opts.forEach((_,oi)=>{const b=document.getElementById(`opt-${idx}-${LETTERS[oi]}`);if(b){b.classList.remove('lam-selected');b.disabled=true;}});
    const correct=letter===q.ans;
    if(!correct)wrongSet.add(rawIdx);
    const cb=document.getElementById(`opt-${idx}-${letter}`);if(cb)cb.classList.add(correct?'correct-ans':'wrong-ans');
    if(!correct){const ci=LETTERS.indexOf(q.ans);const crb=document.getElementById(`opt-${idx}-${LETTERS[ci]}`);if(crb)crb.classList.add('revealed-correct');}
    const fb=document.getElementById('fb-'+idx);
    if(fb){
      const cl=q.ans.toUpperCase();
      fb.className='feedback '+(correct?'ok':'bad');
      fb.innerHTML=correct?'✓ Correct!':`✗ Incorrect — correct answer: <strong>${cl}</strong>`;
      setTimeout(()=>fb.classList.add('show'),idx*55);
    }
  });
  updateStats();updateLAMButton();updateGuide();saveState();
  document.getElementById('quizArea')?.scrollIntoView({behavior:'smooth',block:'start'});
}

function applyAnswer(idx,letter,animate){
  const q=questions[idx];
  const correct=letter===q.ans;
  q.opts.forEach((_,oi)=>{const b=document.getElementById(`opt-${idx}-${LETTERS[oi]}`);if(b)b.disabled=true;});
  const cb=document.getElementById(`opt-${idx}-${letter}`);if(cb)cb.classList.add(correct?'correct-ans':'wrong-ans');
  if(!correct){const ci=LETTERS.indexOf(q.ans);const crb=document.getElementById(`opt-${idx}-${LETTERS[ci]}`);if(crb)crb.classList.add('revealed-correct');}
  const fb=document.getElementById('fb-'+idx);
  if(fb){
    const cl=q.ans.toUpperCase();
    fb.className='feedback '+(correct?'ok':'bad');
    fb.innerHTML=correct?'✓ Correct!':`✗ Incorrect — correct answer: <strong>${cl}</strong>`;
    if(animate)requestAnimationFrame(()=>requestAnimationFrame(()=>fb.classList.add('show')));
    else fb.classList.add('show');
  }
}

function renderGuide(){
  const guide=document.getElementById('lamGuide');
  const grid=document.getElementById('lamGuideGrid');
  guide.classList.toggle('visible',isLAM);
  if(!isLAM){grid.innerHTML='';return;}
  grid.innerHTML='';
  questions.forEach((q,idx)=>{
    const rawIdx=RAW.indexOf(q);
    const btn=document.createElement('button');
    btn.className='lam-guide-btn';
    btn.id='gb-'+idx;
    btn.onclick=()=>document.getElementById('q-'+idx)?.scrollIntoView({behavior:'smooth',block:'start'});
    grid.appendChild(btn);
  });
  updateGuide();
}

function updateGuide(){
  if(!isLAM)return;
  questions.forEach((q,idx)=>{
    const rawIdx=RAW.indexOf(q);
    const btn=document.getElementById('gb-'+idx);
    if(!btn)return;
    const isFlagged=flagSet.has(rawIdx);
    const letter=userAnswers[idx];
    const flagIcon=isFlagged?'<span class="gb-flag">🚩</span>':'';
    let stateClass='gb-unanswered', stateIcon='';
    if(lamRevealed&&letter!==undefined){
      const correct=letter===q.ans;
      stateClass=correct?'gb-correct':'gb-wrong';
      stateIcon=correct?'✓':'✗';
    } else if(letter!==undefined){
      stateClass='gb-selected';stateIcon='·';
    }
    btn.className='lam-guide-btn '+stateClass;
    btn.innerHTML=`${stateIcon?`<span>${stateIcon}</span>`:''}Q${rawIdx+1}${flagIcon}`;
  });
}

function updateLAMButton(){
  if(!isLAM)return;
  const total=questions.length,answered=Object.keys(userAnswers).length;
  const btn=document.getElementById('lamCheckBtn'),note=document.getElementById('lamNote');
  if(lamRevealed){btn.disabled=true;btn.textContent='✓ Answers Revealed';note.textContent='Reset to try again';}
  else if(answered>=total&&total>0){btn.disabled=false;btn.textContent='Check Answers';note.textContent=`All ${total} questions selected — ready!`;}
  else{btn.disabled=true;btn.textContent='Check Answers';note.textContent=`${answered} / ${total} selected — answer all to unlock`;}
}

function popVal(id){const el=document.getElementById(id);if(!el)return;el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');}

function updateStats(){
  const total=questions.length,answered=Object.keys(userAnswers).length;
  let correct=0;
  if(!isLAM||lamRevealed){Object.entries(userAnswers).forEach(([i,letter])=>{if(letter===questions[+i].ans)correct++;});}
  const pct=total?Math.round(answered/total*100):0;
  const nC=(!isLAM||lamRevealed)?correct:0;
  const nW=(!isLAM||lamRevealed)?answered-correct:0;
  const nF=flagSet.size,nR=total-answered;
  if(document.getElementById('statCorrect').textContent!==String(nC))popVal('statCorrect');
  if(document.getElementById('statWrong').textContent!==String(nW))popVal('statWrong');
  if(document.getElementById('statFlagged').textContent!==String(nF))popVal('statFlagged');
  if(document.getElementById('statRemain').textContent!==String(nR))popVal('statRemain');
  document.getElementById('statCorrect').textContent=nC;
  document.getElementById('statWrong').textContent=nW;
  document.getElementById('statFlagged').textContent=nF;
  document.getElementById('statRemain').textContent=nR;
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('progText').textContent=(isLAM&&!lamRevealed)?`${answered} / ${total} selected`:`${answered} / ${total} answered`;
  document.getElementById('progPct').textContent=pct+'%';
}

function showResults(){
  const total=questions.length,answered=Object.keys(userAnswers).length;
  if(!answered){alert('Answer some questions first!');return;}
  if(isLAM&&!lamRevealed){alert('Press "Check Answers" first to reveal your results!');return;}
  let correct=0;
  Object.entries(userAnswers).forEach(([i,letter])=>{if(letter===questions[+i].ans)correct++;});
  const pct=Math.round(correct/total*100);
  const el=document.getElementById('results');
  el.style.display='block';el.style.animation='none';void el.offsetWidth;el.style.animation='';
  document.getElementById('resTitle').textContent=pct>=70?'🎉 Well Done!':'Keep Studying';
  document.getElementById('resPct').textContent=pct+'%';
  document.getElementById('resPct').className='score-big '+(pct>=70?'pass':'fail');
  document.getElementById('resDetail').textContent=`${correct} correct out of ${answered} answered (${total} total questions)`;
  el.scrollIntoView({behavior:'smooth'});
}

function initQuiz(){
  const restored=loadState();
  if(restored&&Object.keys(userAnswers).length>0){
    document.getElementById('lamToggle').classList.toggle('on',isLAM);
    document.getElementById('amDesc').innerHTML=isLAM
      ?'<strong>LAM</strong> — select all answers, then check at the end'
      :'<strong>IAM</strong> — answers revealed instantly after each pick';
    document.querySelectorAll('.mode-btn').forEach((b,i)=>b.classList.toggle('active',['all','shuffle','wrong','flagged'][i]===mode));
    document.getElementById('modeLabel').textContent={all:'All Questions',shuffle:'Shuffled',wrong:'Wrong Only',flagged:'🚩 Flagged'}[mode];
    buildQuestions();renderAll();updateStats();
  } else {
    resetQuiz();
  }
}

if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',initQuiz);}
else{initQuiz();}

/* Floating jump button (LAM only) */
let floatReturnY=null;
function floatJumpClick(){
  const btn=document.getElementById('floatJump');
  if(btn.dataset.dir==='up'){
    // return to remembered position
    if(floatReturnY!==null){window.scrollTo({top:floatReturnY,behavior:'smooth'});}
    floatReturnY=null;
  }else{
    // remember current scroll, jump to guide
    floatReturnY=window.scrollY;
    const guide=document.getElementById('lamGuide');
    if(guide)guide.scrollIntoView({behavior:'smooth',block:'start'});
  }
}
function updateFloatJump(){
  const btn=document.getElementById('floatJump');
  if(!btn)return;
  // visible only in LAM with questions
  if(!isLAM||questions.length===0){btn.classList.remove('visible');return;}
  btn.classList.add('visible');
  // detect "at bottom" — within 200px of page bottom
  const nearBottom=(window.innerHeight+window.scrollY)>=(document.body.offsetHeight-200);
  if(nearBottom){btn.dataset.dir='up';btn.textContent='↑';btn.title='Return to where you were';}
  else{btn.dataset.dir='down';btn.textContent='↓';btn.title='Jump to question list';}
}

window.addEventListener('scroll',()=>{
  document.getElementById('progressWrap').classList.toggle('scrolled',window.scrollY>80);
  updateFloatJump();
},{passive:true});
</script>
